<!DOCTYPE html>

<style>

body{background:#070d18;color:#e2e8f0;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;min-height:100vh}
button{cursor:pointer;font-family:inherit}

<div id="root"></div>

    <div style="display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #1e3050">

</div>
`},

</div>
<div class="card">
  <div style="color:#fbbf24;font-weight:700;font-size:14px;margin-bottom:10px">實作口訣</div>

s1_emt: function(){return `

  <div>
    <div style="color:#f59e0b;font-weight:700;font-size:13px;margin-bottom:8px">③ 鞍型彎（Saddle）— 用來跨越已有的管路</div>

</div>
`},

function tableHTML(rows){
  var s='<div style="overflow-x:auto;margin:8px 0"><table style="width:100%;border-collapse:collapse;font-size:12px">';
  rows.forEach(function(r,i){
    var bg=i===0?'#131f30':i%2===0?'#0a1020':'transparent';
    s+='<tr style="border-bottom:1px solid #1e3050;background:'+bg+'">';
    var tc=i===0?'#93c5fd':'#94a3b8';
    r.forEach(function(c){s+='<td style="padding:7px 10px;color:'+tc+'">'+c+'</td>';});
    s+='</tr>';
  });
  s+='</table></div>';
  return s;
}

    var y=i*70+5;

  return '<svg viewBox="0 0 480 170" style="width:100%;background:#060e1a;border-radius:10px;margin-bottom:10px">    <text x="100" y="15" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">針型礙子（頂溝/邊溝）</text>    <rect x="80" y="70" width="40" height="60" rx="5" fill="#94a3b8" stroke="#64748b" stroke-width="2"/>    <rect x="70" y="80" width="60" height="15" rx="3" fill="#64748b"/>    <rect x="70" y="100" width="60" height="15" rx="3" fill="#64748b"/>    <line x1="10" y1="68" x2="190" y2="68" stroke="#f59e0b" stroke-width="4"/>    <text x="10" y="58" fill="#f59e0b" font-size="8">導線（頂溝）</text>    '+Array.from({length:6},function(_,i){return '<ellipse cx="'+(30+i*28)+'" cy="68" rx="4" ry="3" fill="none" stroke="#e2e8f0" stroke-width="1.5" transform="rotate(-30 '+(30+i*28)+' 68)"/>';}).join('')+'    <text x="100" y="148" text-anchor="middle" fill="#64748b" font-size="8">紮線每隔3圈一扎，均勻分布</text>    <text x="340" y="15" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">軸型礙子（終端綁紮）</text>    <rect x="300" y="60" width="80" height="80" rx="8" fill="#94a3b8" stroke="#64748b" stroke-width="2"/>    <circle cx="340" cy="100" r="20" fill="#060e1a"/>    <line x1="220" y1="88" x2="300" y2="88" stroke="#f59e0b" stroke-width="4"/>    <line x1="220" y1="88" x2="300" y2="112" stroke="#f59e0b" stroke-width="3" stroke-dasharray="4,2"/>    <text x="225" y="80" fill="#f59e0b" font-size="8">導線折回</text>    <text x="225" y="128" fill="#64748b" font-size="7">折回19cm</text>    <text x="225" y="140" fill="#64748b" font-size="7">先繞5圈</text>    <text x="225" y="152" fill="#64748b" font-size="7">再繞30圈</text>    <text x="340" y="158" text-anchor="middle" fill="#64748b" font-size="7">終端綁紮固定導線</text>  </svg>';}

// ── App主程式 ──────────────────────────────────────────
var currentLesson = null;
var prog = JSON.parse(localStorage.getItem('b_prac_prog')||'{}');

function saveProg(){localStorage.setItem('b_prac_prog',JSON.stringify(prog));}

function renderRoot(){
  document.getElementById('root').innerHTML =
    currentLesson ? renderLesson() : renderHome();
}

function renderHome(){
  var done = LESSONS.filter(function(l){return prog[l.id];}).length;
  function stationGroup(n,color,label){
    var ls=LESSONS.filter(function(l){return l.station===n;});
    var html='<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="height:3px;flex:1;background:'+color+'44;border-radius:2px"></div><span style="font-size:12px;font-weight:700;color:'+color+';white-space:nowrap">'+label+'</span><div style="height:3px;flex:1;background:'+color+'44;border-radius:2px"></div></div>';
    ls.forEach(function(l,idx){
      var done2=prog[l.id];
      var bc=done2?l.color+'66':'#1e2d40';
      var icon=done2?'&#x2705;':'&#x1F4D6;';
      var globalIdx=LESSONS.indexOf(l);
      html+='<button onclick="openLesson(LESSONS['+globalIdx+'].id)" style="width:100%;display:flex;align-items:center;gap:10px;padding:12px 14px;margin-bottom:7px;background:#0d1827;border:1px solid '+bc+';border-radius:10px;cursor:pointer;text-align:left">'+
        '<span style="font-size:22px">'+l.icon+'</span>'+
        '<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#e2e8f0">'+l.title+'</div>'+
        '<div style="font-size:11px;color:#64748b;margin-top:1px">'+l.subtitle+'</div></div>'+
        '<span style="font-size:14px">'+icon+'</span>'+
        '<span style="color:#334155">&#x203A;</span></button>';
    });
    html+='</div>';
    return html;
  }
  return '<div style="min-height:100vh">'+
    '<div style="background:linear-gradient(135deg,#0d1f2d,#070f1a);border-bottom:1px solid #1e2d40;padding:16px 18px">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">'+
    '<div style="width:46px;height:46px;background:linear-gradient(135deg,#ef4444,#7c3aed);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 16px #ef444444">⚡</div>'+
    '<div><div style="font-size:18px;font-weight:800;color:#f8fafc">乙級室內配線 實作教學</div>'+
    '<div style="font-size:11px;color:#64748b">三站完整實作步驟、SVG示意圖、配線手法</div></div>'+
    '<div style="margin-left:auto;text-align:right"><div style="font-size:10px;color:#64748b">完成</div>'+
    '<div style="font-size:15px;color:#a78bfa;font-weight:700">'+done+'/'+LESSONS.length+'</div></div></div>'+
    '<div style="background:#1e293b;border-radius:999px;height:4px">'+
    '<div style="height:100%;width:'+Math.round(done/LESSONS.length*100)+'%;background:linear-gradient(90deg,#3b82f6,#ef4444);border-radius:999px;transition:width .5s"></div></div>'+
    '</div>'+
    '<div style="padding:12px 14px 60px;max-width:680px;margin:0 auto">'+
    stationGroup(1,'#3b82f6','🏗️ 第一站：屋內線路裝置（160分鐘）')+
    stationGroup(2,'#f59e0b','⚙️ 第二站：電機控制裝置（90分鐘）')+
    stationGroup(3,'#ef4444','🏭 第三站：高壓外線作業（90分鐘）')+
    '</div></div>';

}

function markDone(id){prog[id]=1;saveProg();currentLesson=null;renderRoot();}
function openLesson(id){
  currentLesson = id;
  renderRoot();
  window.scrollTo(0,0);
}

function renderLesson(){
  var l = LESSONS.find(function(x){return x.id===currentLesson;});
  var content = CONTENT[currentLesson] ? CONTENT[currentLesson]() : '<p style="color:#64748b">內容準備中</p>';
  return '<div style="min-height:100vh;background:#070d18">'+
    '<div style="background:#0d1424;border-bottom:1px solid #1e2d40;padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10">'+
    '<button onclick="currentLesson=null;renderRoot()" style="background:#1e2d40;border:none;color:#94a3b8;padding:7px 13px;border-radius:7px;font-size:13px;cursor:pointer">← 返回</button>'+
    '<div style="flex:1"><div style="font-size:10px;color:'+l.color+';font-weight:700">第'+l.station+'站</div>'+
    '<div style="font-size:14px;font-weight:700;color:#f8fafc">'+l.icon+' '+l.title+'</div></div>'+
    '<button onclick="markDone(currentLesson)" style="background:linear-gradient(135deg,#166534,#15803d);border:none;color:#86efac;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">&#x2705; 學完了</button>'+
    '</div>'+
    '<div style="padding:16px 14px 80px;max-width:720px;margin:0 auto">'+content+'</div></div>';
}

renderRoot();
</script>
</body>
